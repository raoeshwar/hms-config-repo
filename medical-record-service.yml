server:
  port: 8084

spring:
  application:
    name: medical-record-service
  datasource:
    url: jdbc:postgresql://localhost:5432/hms_medical_record_db
    username: postgres
    password: root
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: medicalrecord_schema

jwt:
  secret: hms_super_secret_key_that_must_be_long_enough_for_hs256_algorithm

appointment:
  service:
    url: http://localhost:8083

logging:
  level:
    com.hms: DEBUG
    org.springframework.web: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost


