version: '3.8'

services:
  doctor-db:
    image: postgres:15-alpine
    container_name: doctor_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hms_doctor_db
    ports:
      - "5434:5432"
    volumes:
      - doctor_db_data:/var/lib/postgresql/data
      
  doctor-redis:
    image: redis:7-alpine
    container_name: doctor_redis
    ports:
      - "6379:6379"

volumes:
  doctor_db_data:
